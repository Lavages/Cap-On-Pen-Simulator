<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cap On Pen - Pro League</title>
    <style>
        :root {
            --cs-pink-accent: #f06292;
            --digital-green: #00ff41;
            --pen-pink: #e8a8b8;
            --pen-silver: #c0c0c0;
            --pen-chrome: #e0e0e0;
        }

        body {
            background: #120a08 url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        /* --- PROFESSIONAL SIDEBAR --- */
        #side-panel {
            width: 250px;
            height: 96vh;
            background: #fafafa;
            margin-left: 10px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            z-index: 100;
            overflow: hidden;
        }

        .cs-header {
            background: #1a1a1a;
            color: #fff;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--cs-pink-accent);
        }

        .cs-section {
            padding: 12px;
            background: #ececec;
            border-bottom: 1px solid #ccc;
        }

        .cs-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
            font-size: 0.8rem;
        }

        .stat-label {
            color: #555;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.65rem;
        }

        .stat-bold {
            font-weight: 700;
            color: #000;
            text-align: right;
            font-family: monospace;
        }

        #times-list {
            flex-grow: 1;
            overflow-y: auto;
            background: #fff;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .time-entry {
            display: grid;
            grid-template-columns: 35px 1fr 70px;
            padding: 6px 12px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .btn-clear {
            background: #333;
            border: none;
            color: #eee;
            padding: 4px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: bold;
        }

        /* --- WORKSPACE --- */
        #workspace {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 100%;
        }

        #mat {
            width: 1000px;
            height: 560px;
            background: #0d0216;
            border-radius: 110px;
            border: 12px solid #222;
            position: relative;
            box-shadow: inset 0 0 100px #000, 0 40px 60px rgba(0, 0, 0, 0.7);
            background-image: radial-gradient(circle at 50% 50%, #2e1a47 0%, transparent 85%), url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        /* --- TIMER --- */
        #g5-timer {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 130px;
            background: #1a1a1a;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
            border-top: 2px solid #333;
            z-index: 10;
        }

        #timer-screen {
            background: #000;
            width: 220px;
            height: 70px;
            margin: 10px auto;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        #timer-text {
            font-family: 'Courier New', monospace;
            font-size: 3.2rem;
            color: var(--digital-green);
            margin: 0;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
        }

        #reset-btn {
            position: absolute;
            right: 80px;
            top: 25px;
            width: 45px;
            height: 45px;
            background: #c62828;
            border-radius: 50%;
            border: 4px solid #111;
            cursor: pointer;
            color: white;
            font-size: 9px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #5f1414;
        }

        /* --- ENHANCED LOGO --- */
        #cover-wrapper {
            position: absolute;
            width: 320px;
            height: 320px;
            cursor: pointer;
            z-index: 50;
            left: 340px;
            top: 90px;
        }

        #cover {
            width: 100%;
            height: 100%;
            background: #000;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            padding: 8px;
            border-radius: 6px;
        }

        .sticker {
            border-radius: 2px;
        }

        #logo-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: #000;
            border: 3px solid #fff;
            outline: 3px solid var(--cs-pink-accent);
            padding: 20px 0;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #logo-main {
            font-weight: 900;
            font-size: 1.8rem;
            font-style: italic;
            color: #fff;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1;
        }

        #logo-sub {
            color: var(--cs-pink-accent);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-top: 5px;
        }

        /* --- PEN COMPONENTS --- */
        .movable {
            position: absolute;
            z-index: 60;
            display: none;
            cursor: grab;
        }

        #pen {
            width: 250px;
            height: 20px;
            background: linear-gradient(to bottom, #f0c0cd, var(--pen-pink), #b07080);
            border-radius: 2px 10px 10px 2px;
        }

        #pen-nib {
            position: absolute;
            left: -40px;
            top: 1px;
            width: 40px;
            height: 18px;
            background: linear-gradient(to bottom, #aaa, #eee, #aaa);
            clip-path: polygon(100% 10%, 100% 90%, 75% 100%, 0% 50%, 75% 0%);
        }

        #cap {
            width: 110px;
            height: 26px;
            background: linear-gradient(to bottom, #f8c8d5, var(--pen-pink), #a06070);
            border-radius: 4px 12px 12px 4px;
        }

        .cap-clip {
            position: absolute;
            top: 10px;
            left: 20px;
            width: 70px;
            height: 4px;
            background: var(--pen-chrome);
            border-radius: 0 2px 2px 0;
        }

        .shaking {
            animation: rumble 0.1s infinite;
        }

        @keyframes rumble {
            0% {
                transform: translate(2px, 2px)
            }

            50% {
                transform: translate(-2px, -2px)
            }

            100% {
                transform: translate(2px, -2px)
            }
        }
    </style>
</head>

<body>
    <div id="side-panel">
        <div class="cs-header"><span>PRO LEAGUE</span><button class="btn-clear" onclick="clearData()">CLEAR</button>
        </div>
        <div class="cs-section">
            <div class="cs-stats-grid">
                <span class="stat-label">Solves</span> <span class="stat-bold" id="s-count">0</span>
                <span class="stat-label">Best</span> <span class="stat-bold" id="s-best">--</span>
                <span class="stat-label">Avg 5</span> <span class="stat-bold" id="s-ao5">--</span>
            </div>
        </div>
        <div id="times-list"></div>
    </div>

    <div id="workspace">
        <div id="mat">
            <div id="g5-timer">
                <div id="timer-screen">
                    <p id="timer-text">0.000</p>
                </div>
                <div id="reset-btn" onclick="reset()">RESET</div>
            </div>

            <div id="cover-wrapper" onmousedown="start(event)" ontouchstart="start(event)">
                <div id="cover">
                    <div id="logo-badge">
                        <div id="logo-main">Cap On Pen</div>
                        <div id="logo-sub">PRO LEAGUE</div>
                    </div>
                </div>
            </div>

            <div id="pen" class="movable">
                <div id="pen-nib"></div>
            </div>
            <div id="cap" class="movable">
                <div class="cap-clip"></div>
            </div>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('cover-wrapper');
        const timerText = document.getElementById('timer-text');
        const pen = document.getElementById('pen'), cap = document.getElementById('cap');
        const list = document.getElementById('times-list');
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

        let solves = JSON.parse(localStorage.getItem('cop_pro_solves')) || [];
        let running = false, ready = true, active = null;
        let offset = { x: 0, y: 0 }, interval, startTime;
        let lastX = 0, lastY = 0;

        function initPattern() {
            const cover = document.getElementById('cover');
            const logo = document.getElementById('logo-badge');
            const colors = ['#ffffff', '#ffff00', '#ff0000', '#ffa500', '#00ff00', '#0000ff'];
            cover.innerHTML = ''; cover.appendChild(logo);
            for (let i = 0; i < 64; i++) {
                let s = document.createElement('div');
                s.className = 'sticker';
                s.style.backgroundColor = colors[Math.floor(Math.random() * 6)];
                cover.appendChild(s);
            }
        }

        function refresh() {
            list.innerHTML = '';
            solves.forEach((t, i) => {
                let div = document.createElement('div');
                div.className = 'time-entry';
                div.innerHTML = `<span>${i + 1}.</span><span></span><span class="stat-bold">${t.toFixed(3)}</span>`;
                list.prepend(div);
            });
            document.getElementById('s-count').innerText = solves.length;
            document.getElementById('s-best').innerText = solves.length ? Math.min(...solves).toFixed(3) : "--";
            document.getElementById('s-ao5').innerText = getAvg(5);
        }

        function getAvg(n) {
            if (solves.length < n) return "--";
            let s = [...solves].slice(-n).sort((a, b) => a - b);
            s.pop(); s.shift();
            return (s.reduce((a, b) => a + b, 0) / s.length).toFixed(3);
        }

        function clearData() { if (confirm("Clear Pro League stats?")) { solves = []; localStorage.removeItem('cop_pro_solves'); refresh(); } }

        function reset() {
            running = false; ready = false; clearInterval(interval);
            timerText.style.color = "#ff4444";
            wrapper.style.display = 'block'; wrapper.classList.add('shaking');
            pen.style.display = 'none'; cap.style.display = 'none';

            setTimeout(() => {
                wrapper.classList.remove('shaking');
                // COMPLETELY RANDOM POSITIONS
                pen.style.left = (50 + Math.random() * 700) + 'px';
                pen.style.top = (50 + Math.random() * 400) + 'px';
                cap.style.left = (50 + Math.random() * 700) + 'px';
                cap.style.top = (50 + Math.random() * 400) + 'px';

                timerText.innerText = "0.000"; timerText.style.color = "var(--digital-green)";
                ready = true;
            }, 500);
        }

        function start() {
            if (!ready) return;
            wrapper.style.display = 'none'; pen.style.display = 'block'; cap.style.display = 'block';
            running = true; startTime = performance.now();
            interval = setInterval(() => { timerText.innerText = ((performance.now() - startTime) / 1000).toFixed(3); }, 10);
        }

        function move(e) {
            if (!active || !running) return;
            const ev = e.touches ? e.touches[0] : e;
            const m = document.getElementById('mat').getBoundingClientRect();
            const s = m.width / 1000;
            const x = (ev.clientX - m.left) / s - offset.x;
            const y = (ev.clientY - m.top) / s - offset.y;
            active.style.left = x + 'px'; active.style.top = y + 'px';

            const pX = parseFloat(pen.style.left), pY = parseFloat(pen.style.top);
            const cX = parseFloat(cap.style.left), cY = parseFloat(cap.style.top);
            const targetX = pX - 60, targetY = pY - 3;

            if (Math.abs(cX - targetX) < 15 && Math.abs(cY - targetY) < 15) {
                // Must enter from the tip (Left side or Top placement)
                if (lastX < targetX || lastY < targetY) {
                    running = false; clearInterval(interval);
                    clickSound.currentTime = 0; clickSound.play();
                    solves.push(parseFloat(timerText.innerText));
                    localStorage.setItem('cop_pro_solves', JSON.stringify(solves));
                    cap.style.left = targetX + 'px'; cap.style.top = targetY + 'px';
                    timerText.style.color = "#fff"; active = null; refresh();
                }
            }
            lastX = cX; lastY = cY;
        }

        function down(e, el) {
            e.preventDefault(); active = el;
            const ev = e.touches ? e.touches[0] : e;
            const r = el.getBoundingClientRect(), m = document.getElementById('mat').getBoundingClientRect();
            const s = m.width / 1000;
            offset.x = (ev.clientX - r.left) / s; offset.y = (ev.clientY - r.top) / s;
        }

        pen.addEventListener('mousedown', (e) => down(e, pen)); pen.addEventListener('touchstart', (e) => down(e, pen));
        cap.addEventListener('mousedown', (e) => down(e, cap)); cap.addEventListener('touchstart', (e) => down(e, cap));
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', () => active = null); window.addEventListener('touchend', () => active = null);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') reset(); });

        initPattern(); refresh(); reset();
    </script>
</body>

</html>
