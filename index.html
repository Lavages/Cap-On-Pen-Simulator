<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cap On Pen - Pro Simulator</title>
    <style>
        :root {
            --visconti-orange: #ff6a00;
            --visconti-gold: #ffd740;
            --digital-green: #00ff41;
            --ui-pink: #f06292;
            --g5-blue: #0088ff;
            --g5-sensor-yellow: #ffdf00;
        }

        body {
            background: #120a08 url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        /* --- SIDEBAR --- */
        #side-panel {
            width: 250px;
            height: 96vh;
            background: #fafafa;
            margin-left: 10px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            z-index: 100;
            overflow: hidden;
        }

        .cs-header {
            background: #1a1a1a;
            color: #fff;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--ui-pink);
        }

        .cs-section {
            padding: 12px;
            background: #ececec;
            border-bottom: 1px solid #ccc;
        }

        .cs-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
            font-size: 0.8rem;
        }

        .stat-label {
            color: #555;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.65rem;
        }

        .stat-bold {
            font-weight: 700;
            color: #000;
            text-align: right;
            font-family: monospace;
        }

        #times-list {
            flex-grow: 1;
            overflow-y: auto;
            background: #fff;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .time-entry {
            display: grid;
            grid-template-columns: 35px 1fr 70px;
            padding: 6px 12px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .btn-clear {
            background: #333;
            border: none;
            color: #eee;
            padding: 4px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: bold;
        }

        /* --- COMPETITION MAT --- */
        #workspace {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 100%;
        }

        #mat {
            width: 1020px;
            height: 520px;
            border-radius: 150px;
            border: 12px solid #111;
            position: relative;
            box-shadow: 0 50px 80px rgba(0, 0, 0, 0.9);
            background: #000;
            background-image:
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'),
                radial-gradient(circle at 50% 120%, rgba(0, 150, 255, 0.5), transparent 70%),
                radial-gradient(circle at 20% 30%, rgba(255, 0, 100, 0.6), transparent 60%),
                radial-gradient(circle at 80% 40%, rgba(255, 200, 0, 0.5), transparent 60%);
        }

        /* WCA LOGO */
        .wca-logo {
            position: absolute;
            left: 80px;
            bottom: 100px;
            width: 85px;
            height: 85px;
            background: url('https://upload.wikimedia.org/wikipedia/en/thumb/1/13/World_Cube_Association_logo.svg/1200px-World_Cube_Association_logo.svg.png') no-repeat center;
            background-size: contain;
            opacity: 0.85;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        /* WSSA BADGE */
        .wssa-badge {
            position: absolute;
            right: 80px;
            bottom: 100px;
            width: 90px;
            height: 90px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/WSSA_Logo.svg/1200px-WSSA_Logo.svg.png') no-repeat center;
            background-size: contain;
            opacity: 0.8;
            filter: brightness(1.2);
        }

        /* --- AUTHENTIC G5 TIMER --- */
        #g5-timer-body {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 460px;
            height: 140px;
            background: #0a0a0a;
            clip-path: polygon(10% 0%, 90% 0%, 100% 40%, 100% 100%, 0% 100%, 0% 40%);
            border-top: 3px solid #444;
            z-index: 10;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.5);
        }

        /* Central Control Section */
        #timer-screen-container {
            background: #2a2a2a;
            width: 180px;
            height: 90px;
            margin: 10px auto 0;
            border-radius: 10px;
            border: 2px solid #444;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #timer-screen {
            background: #000;
            width: 140px;
            height: 45px;
            border: 2px solid #555;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.2);
        }

        #timer-text {
            font-family: 'Courier New', monospace;
            font-size: 2.4rem;
            color: var(--digital-green);
            margin: 0;
        }

        /* G5 Buttons */
        .g5-btn {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #111;
            cursor: pointer;
        }

        #power-btn {
            background: #ff3d00;
            bottom: 8px;
            left: 35px;
        }

        #save-btn {
            background: #4caf50;
            bottom: 8px;
            right: 35px;
        }

        #reset-btn {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 25px;
            background: #333;
            border-radius: 5px;
            border: 2px solid #111;
            color: white;
            font-size: 7px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* G5 Sensor Pads */
        .sensor-pad {
            position: absolute;
            bottom: 15px;
            width: 110px;
            height: 100px;
            background: #050505;
            border: 2px solid #2a2a2a;
            border-radius: 25px;
            background-image:
                radial-gradient(circle at 50% 50%, var(--g5-blue) 0%, transparent 90%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.03) 0, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 4px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8), inset 0 0 20px var(--g5-blue);
        }

        #pad-left {
            left: 10px;
            transform: rotate(-12deg);
        }

        #pad-right {
            right: 10px;
            transform: rotate(12deg);
        }

        .hand-icon {
            color: var(--g5-sensor-yellow);
            font-size: 40px;
            filter: drop-shadow(0 0 8px var(--g5-sensor-yellow));
            font-weight: bold;
        }

        /* --- VISCONTI PEN & CAP --- */
        .movable {
            position: absolute;
            z-index: 60;
            display: none;
            cursor: grab;
        }

        #pen {
            width: 320px;
            height: 28px;
            background: linear-gradient(to bottom, #ffa726 0%, #fb8c00 45%, #e65100 55%, #bf360c 100%);
            border-radius: 0 16px 16px 0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), inset 0 2px 2px rgba(255, 255, 255, 0.3);
        }

        .gold-ring {
            position: absolute;
            width: 7px;
            height: 100%;
            background: linear-gradient(to bottom, #fff9c4, #fbc02d, #f57f17, #fbc02d, #fff9c4);
            border-left: 1px solid rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(0, 0, 0, 0.2);
        }

        #ring-1 {
            right: 25px;
        }

        #ring-2 {
            left: 12px;
        }

        #pen-grip {
            position: absolute;
            left: -45px;
            top: 2px;
            width: 45px;
            height: 24px;
            background: linear-gradient(to bottom, #ff9800, #ef6c00);
            border-radius: 15px 0 0 15px;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        #pen-nib {
            position: absolute;
            left: -95px;
            top: 0;
            width: 55px;
            height: 28px;
            background: linear-gradient(180deg, #fdd835 0%, #fffde7 40%, #fbc02d 60%, #f9a825 100%);
            clip-path: polygon(100% 15%, 100% 85%, 80% 100%, 0% 50%, 80% 0%);
        }

        #cap {
            width: 155px;
            height: 34px;
            background: linear-gradient(to bottom, #ffa726 0%, #fb8c00 45%, #e65100 55%, #bf360c 100%);
            border-radius: 17px 6px 6px 17px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7), inset 0 2px 2px rgba(255, 255, 255, 0.2);
        }

        #cap-band {
            position: absolute;
            right: 0;
            width: 28px;
            height: 100%;
            background: linear-gradient(to bottom, #fff176, #fbc02d, #f57f17);
            border-radius: 0 6px 6px 0;
            background-image: repeating-linear-gradient(90deg, transparent 0, transparent 4px, rgba(0, 0, 0, 0.1) 5px);
        }

        #cap-clip {
            position: absolute;
            left: 35px;
            top: -6px;
            width: 100px;
            height: 14px;
            background: linear-gradient(to bottom, #fffde7, #fbc02d, #f57f17);
            border-radius: 20px 20px 4px 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            font-size: 8px;
            color: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* --- LOGO COVER --- */
        #cover-wrapper {
            position: absolute;
            width: 340px;
            height: 340px;
            cursor: pointer;
            z-index: 50;
            left: 340px;
            top: 60px;
        }

        #cover {
            width: 100%;
            height: 100%;
            background: #000;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        .sticker {
            border-radius: 3px;
        }

        #logo-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: #000;
            border: 3px solid #fff;
            outline: 3px solid var(--ui-pink);
            padding: 25px 0;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #logo-main {
            font-weight: 900;
            font-size: 2rem;
            font-style: italic;
            color: #fff;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1;
        }

        #logo-sub {
            color: var(--ui-pink);
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 5px;
            margin-top: 5px;
        }

        .shaking {
            animation: rumble 0.1s infinite;
        }

        @keyframes rumble {
            0% {
                transform: translate(2px, 2px)
            }

            50% {
                transform: translate(-2px, -2px)
            }

            100% {
                transform: translate(2px, -2px)
            }
        }
    </style>
</head>

<body>
    <div id="side-panel">
        <div class="cs-header"><span>CAP ON PEN</span><button class="btn-clear" onclick="clearData()">CLEAR</button>
        </div>
        <div class="cs-section">
            <div class="cs-stats-grid">
                <span class="stat-label">Solves</span> <span class="stat-bold" id="s-count">0</span>
                <span class="stat-label">Best</span> <span class="stat-bold" id="s-best">--</span>
                <span class="stat-label">Avg 5</span> <span class="stat-bold" id="s-ao5">--</span>
            </div>
        </div>
        <div id="times-list"></div>
    </div>

    <div id="workspace">
        <div id="mat">
            <div class="wca-logo"></div>
            <div class="wssa-badge"></div>

            <div id="g5-timer-body">
                <div id="pad-left" class="sensor-pad"><span class="hand-icon">✋</span></div>

                <div id="timer-screen-container">
                    <div id="timer-screen">
                        <p id="timer-text">0.000</p>
                    </div>
                    <div id="power-btn" class="g5-btn" title="On/Off"></div>
                    <div id="save-btn" class="g5-btn" title="Save"></div>
                    <div id="reset-btn" onclick="reset()">RESET</div>
                </div>

                <div id="pad-right" class="sensor-pad"><span class="hand-icon">✋</span></div>
            </div>

            <div id="cover-wrapper" onmousedown="start(event)" ontouchstart="start(event)">
                <div id="cover"></div>
            </div>

            <div id="pen" class="movable">
                <div id="ring-1" class="gold-ring"></div>
                <div id="ring-2" class="gold-ring"></div>
                <div id="pen-grip"></div>
                <div id="pen-nib"></div>
            </div>

            <div id="cap" class="movable">
                <div id="cap-band"></div>
                <div id="cap-clip">VISCONTI</div>
            </div>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('cover-wrapper');
        const timerText = document.getElementById('timer-text');
        const pen = document.getElementById('pen'), cap = document.getElementById('cap');
        const list = document.getElementById('times-list');
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

        let solves = JSON.parse(localStorage.getItem('cop_g5_v3')) || [];
        let running = false, ready = true, active = null;
        let offset = { x: 0, y: 0 }, interval, startTime;
        let lastCapX = 0, lastPenX = 0;

        function initPattern() {
            const cover = document.getElementById('cover');
            const colors = ['#ffffff', '#ffff00', '#ff0000', '#ffa500', '#00ff00', '#0000ff'];
            cover.innerHTML = '<div id="logo-badge"><div id="logo-main">Cap On Pen</div><div id="logo-sub">PRO SIMULATOR</div></div>';
            for (let i = 0; i < 64; i++) {
                let s = document.createElement('div');
                s.className = 'sticker';
                s.style.backgroundColor = colors[Math.floor(Math.random() * 6)];
                cover.appendChild(s);
            }
        }

        function refresh() {
            list.innerHTML = '';
            solves.forEach((t, i) => {
                let div = document.createElement('div');
                div.className = 'time-entry';
                div.innerHTML = `<span>${i + 1}.</span><span></span><span class="stat-bold">${t.toFixed(3)}</span>`;
                list.prepend(div);
            });
            document.getElementById('s-count').innerText = solves.length;
            document.getElementById('s-best').innerText = solves.length ? Math.min(...solves).toFixed(3) : "--";
            document.getElementById('s-ao5').innerText = getAvg(5);
        }

        function getAvg(n) {
            if (solves.length < n) return "--";
            let s = [...solves].slice(-n).sort((a, b) => a - b);
            s.pop(); s.shift();
            return (s.reduce((a, b) => a + b, 0) / s.length).toFixed(3);
        }

        function clearData() { if (confirm("Clear records?")) { solves = []; localStorage.removeItem('cop_g5_v3'); refresh(); } }

        function reset() {
            running = false; ready = false; clearInterval(interval);
            timerText.style.color = "#ff4444";
            wrapper.style.display = 'block'; wrapper.classList.add('shaking');
            pen.style.display = 'none'; cap.style.display = 'none';

            setTimeout(() => {
                wrapper.classList.remove('shaking');
                pen.style.left = (50 + Math.random() * 600) + 'px';
                pen.style.top = (50 + Math.random() * 250) + 'px';
                cap.style.left = (50 + Math.random() * 600) + 'px';
                cap.style.top = (50 + Math.random() * 250) + 'px';
                lastCapX = parseFloat(cap.style.left); lastPenX = parseFloat(pen.style.left);
                timerText.innerText = "0.000"; timerText.style.color = "var(--digital-green)";
                ready = true;
            }, 500);
        }

        function start() {
            if (!ready) return;
            wrapper.style.display = 'none'; pen.style.display = 'block'; cap.style.display = 'block';
            running = true; startTime = performance.now();
            interval = setInterval(() => { timerText.innerText = ((performance.now() - startTime) / 1000).toFixed(3); }, 10);
        }

        function move(e) {
            if (!active || !running) return;
            const ev = e.touches ? e.touches[0] : e;
            const m = document.getElementById('mat').getBoundingClientRect();
            const s = m.width / 1020;
            const x = (ev.clientX - m.left) / s - offset.x;
            const y = (ev.clientY - m.top) / s - offset.y;
            active.style.left = x + 'px'; active.style.top = y + 'px';
            checkPhysics();
        }

        function checkPhysics() {
            const pX = parseFloat(pen.style.left), pY = parseFloat(pen.style.top);
            const cX = parseFloat(cap.style.left), cY = parseFloat(cap.style.top);
            const targetX = cX + 150; const targetY = cY + 3;
            const dx = Math.abs(pX - targetX); const dy = Math.abs(pY - targetY);

            if (dx < 15 && dy < 15) {
                let valid = false;
                if (active === pen && pX > lastPenX) valid = true;
                if (active === cap && cX < lastCapX) valid = true;
                if (valid) finalize(targetX, targetY);
            }
            lastCapX = cX; lastPenX = pX;
        }

        function finalize(tx, ty) {
            running = false; clearInterval(interval);
            clickSound.currentTime = 0; clickSound.play().catch(() => { });
            solves.push(parseFloat(timerText.innerText));
            localStorage.setItem('cop_g5_v3', JSON.stringify(solves));
            pen.style.left = tx + 'px'; pen.style.top = ty + 'px';
            timerText.style.color = "#fff"; active = null; refresh();
        }

        function down(e, el) {
            e.preventDefault(); active = el;
            const ev = e.touches ? e.touches[0] : e;
            const r = el.getBoundingClientRect(), m = document.getElementById('mat').getBoundingClientRect();
            const s = m.width / 1020;
            offset.x = (ev.clientX - r.left) / s; offset.y = (ev.clientY - r.top) / s;
        }

        pen.addEventListener('mousedown', (e) => down(e, pen)); pen.addEventListener('touchstart', (e) => down(e, pen));
        cap.addEventListener('mousedown', (e) => down(e, cap)); cap.addEventListener('touchstart', (e) => down(e, cap));
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', () => active = null); window.addEventListener('touchend', () => active = null);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') reset(); });

        initPattern(); refresh(); reset();
    </script>
</body>

</html>
